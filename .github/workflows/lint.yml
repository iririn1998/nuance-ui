name: Lint & Format Check

on:
  push:
    branches:
      - main
    paths:
      - "packages/core/**"
  pull_request:
    paths:
      - "packages/core/**"

jobs:
  lint:
    name: Lint & Format (packages/core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        working-directory: packages/core
        run: pnpm lint

      - name: Format check (oxfmt)
        working-directory: packages/core
        run: pnpm fmt:check
